<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Liquidity Forecaster</title>
  <style>
    :root { --bg:#0f1216; --card:#171c22; --muted:#8b97a3; --line:#2a323b; --text:#e7edf3;
            --green:#2ecc71; --amber:#f1c40f; --red:#e74c3c; --accent:#4aa3ff; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text);
           font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    header { padding:20px 24px; border-bottom:1px solid var(--line); display:flex;
             align-items:center; gap:12px; flex-wrap:wrap; }
    h1 { font-size:18px; margin:0; font-weight:650; }
    main { max-width:980px; margin:0 auto; padding:24px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px;
            padding:18px 20px; margin-bottom:18px; }
    .badge { padding:3px 10px; border-radius:999px; font-weight:700; font-size:12px;
             letter-spacing:.04em; }
    .GREEN { background:rgba(46,204,113,.15); color:var(--green); }
    .AMBER { background:rgba(241,196,15,.15); color:var(--amber); }
    .RED   { background:rgba(231,76,60,.15);  color:var(--red); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
    .stat .k { color:var(--muted); font-size:12px; }
    .stat .v { font-size:20px; font-weight:650; margin-top:2px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th,td { text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:600; }
    td.num { text-align:right; font-variant-numeric:tabular-nums; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .chip { font-size:12px; color:var(--muted); border:1px solid var(--line);
            padding:2px 8px; border-radius:999px; }
    .muted { color:var(--muted); }
    input { background:#0c0f13; border:1px solid var(--line); color:var(--text);
            padding:7px 10px; border-radius:7px; }
    button { background:var(--accent); color:#04121f; border:0; padding:7px 14px;
             border-radius:7px; font-weight:650; cursor:pointer; }
    #error { color:var(--red); }
    svg text { fill:var(--muted); font-size:11px; }
  </style>
</head>
<body>
  <header>
    <h1>Liquidity Forecaster</h1>
    <span id="sev" class="badge" hidden></span>
    <span id="updated" class="muted" style="margin-left:auto"></span>
  </header>
  <main>
    <div class="card" id="auth">
      <div class="k muted">Enter the dashboard token to view the forecast.</div>
      <div style="display:flex; gap:8px; margin-top:10px;">
        <input id="token" type="password" placeholder="DASHBOARD_TOKEN" style="flex:1" />
        <button id="load">Load</button>
      </div>
      <div id="error" style="margin-top:10px"></div>
    </div>

    <div id="dash" hidden>
      <div class="card">
        <div class="grid" id="stats"></div>
        <div class="chips" id="flags"></div>
      </div>
      <div class="card">
        <div class="muted" style="margin-bottom:8px">Projected operational balance</div>
        <div id="chart"></div>
      </div>
      <div class="card" id="driversCard">
        <div class="muted" style="margin-bottom:8px">Drivers of the dip</div>
        <table><thead><tr><th>Date</th><th>Creditor</th><th class="num">Amount</th></tr></thead>
          <tbody id="drivers"></tbody></table>
      </div>
      <div class="card" id="inflowsCard">
        <div class="muted" style="margin-bottom:8px">Expected inflows</div>
        <table><thead><tr><th>Date</th><th>Source</th><th class="num">Amount</th></tr></thead>
          <tbody id="inflows"></tbody></table>
      </div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const nok = (s) => {
      const n = Math.round(parseFloat(s));
      return n.toLocaleString("en-US").replace(/,/g, " ") + " NOK";
    };

    async function load() {
      const token = $("token").value.trim();
      $("error").textContent = "";
      if (!token) { $("error").textContent = "Token required."; return; }
      try {
        const res = await fetch("/api/forecast", { headers: { "X-Dashboard-Token": token } });
        if (res.status === 401) { $("error").textContent = "Unauthorized — wrong token."; return; }
        if (res.status === 503) { $("error").textContent = "Dashboard not configured (set DASHBOARD_TOKEN)."; return; }
        if (!res.ok) { $("error").textContent = "Forecast unavailable (HTTP " + res.status + ")."; return; }
        const d = await res.json();
        localStorage.setItem("lf_token", token);
        render(d);
      } catch (e) {
        $("error").textContent = "Network error.";
      }
    }

    function render(d) {
      $("auth").hidden = true;
      $("dash").hidden = false;
      const sev = $("sev");
      sev.hidden = false; sev.textContent = d.severity; sev.className = "badge " + d.severity;
      $("updated").textContent = "Horizon to " + d.endDate;

      const leadDays = Math.round(
        (new Date(d.firstBreachDate || d.troughDate) - new Date(d.startDate)) / 86400000);
      const stats = [
        ["Trough", nok(d.troughBalance) + " · " + d.troughDate],
        ["Floor", nok(d.floor)],
        ["Shortfall", d.shortfall === "0" ? "—" : nok(d.shortfall)],
        ["Lead time", d.firstBreachDate ? leadDays + " days" : "—"],
        ["Draw on Savings clears?", d.drawOnSavingsClears ? "Yes" : "No"],
        ["Savings", nok(d.savingsBalance)],
      ];
      $("stats").innerHTML = stats.map(
        ([k, v]) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");

      const flags = [];
      if (d.flags.baselineApplied) flags.push("run-rate baseline");
      if (d.flags.fxVariable) flags.push("FX-variable");
      if (d.flags.lowConfidence) flags.push("low confidence");
      if (d.flags.hasRetrying) flags.push("payment retrying — short now");
      $("flags").innerHTML = flags.map((f) => `<span class="chip">${f}</span>`).join("");

      drawChart(d);
      $("drivers").innerHTML = d.drivers.map(
        (r) => `<tr><td>${r.date}</td><td>${esc(r.creditor)}</td><td class="num">${nok(r.amount)}</td></tr>`).join("")
        || `<tr><td colspan="3" class="muted">None</td></tr>`;
      $("inflows").innerHTML = d.inflows.map(
        (r) => `<tr><td>${r.date}</td><td>${esc(r.source)}</td><td class="num">${nok(r.amount)}</td></tr>`).join("")
        || `<tr><td colspan="3" class="muted">None</td></tr>`;
      $("inflowsCard").hidden = d.inflows.length === 0;
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function drawChart(d) {
      const W = 900, H = 260, pad = 48;
      const pts = d.curve.map((p) => parseFloat(p.balance));
      const floor = parseFloat(d.floor), amber = parseFloat(d.amberThreshold);
      const lo = Math.min(...pts, floor) * 0.98, hi = Math.max(...pts, amber) * 1.02;
      const x = (i) => pad + (i * (W - 2 * pad)) / (pts.length - 1 || 1);
      const y = (v) => H - pad - ((v - lo) * (H - 2 * pad)) / (hi - lo || 1);
      const line = pts.map((v, i) => (i ? "L" : "M") + x(i).toFixed(1) + " " + y(v).toFixed(1)).join(" ");
      const color = d.severity === "RED" ? "var(--red)" : d.severity === "AMBER" ? "var(--amber)" : "var(--green)";
      const floorY = y(floor).toFixed(1), amberY = y(amber).toFixed(1);
      const first = d.curve[0].date, last = d.curve[d.curve.length - 1].date;
      $("chart").innerHTML = `
        <svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Projected balance">
          <line x1="${pad}" y1="${floorY}" x2="${W - pad}" y2="${floorY}" stroke="var(--red)" stroke-dasharray="5 4" opacity="0.7"/>
          <line x1="${pad}" y1="${amberY}" x2="${W - pad}" y2="${amberY}" stroke="var(--amber)" stroke-dasharray="3 4" opacity="0.5"/>
          <path d="${line}" fill="none" stroke="${color}" stroke-width="2"/>
          <text x="${pad}" y="${+floorY - 5}">floor ${nok(d.floor)}</text>
          <text x="${pad}" y="${H - 16}">${first}</text>
          <text x="${W - pad}" y="${H - 16}" text-anchor="end">${last}</text>
        </svg>`;
    }

    $("load").addEventListener("click", load);
    $("token").addEventListener("keydown", (e) => { if (e.key === "Enter") load(); });
    const saved = localStorage.getItem("lf_token");
    if (saved) { $("token").value = saved; load(); }
  </script>
</body>
</html>
