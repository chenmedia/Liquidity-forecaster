name: Liquidity forecast

# Runs the forecaster on a schedule and alerts #finance (with email fallback), and
# publishes the latest forecast snapshot to Neon for the dashboard.
# (Unset GitHub Actions vars/secrets arrive as empty strings; config coalesces
# both numeric and string settings to their defaults.)
# Safe to run before secrets exist: if FOLIO_API_KEY is not configured the run
# skips cleanly instead of failing. Provide repo Actions secrets to enable
# (see docs/SECRETS.md): FOLIO_API_KEY, SLACK_WEBHOOK_URL, DATABASE_URL, optionally SMTP_*.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the alert instead of sending it"
        type: boolean
        default: true
  # Re-run when this workflow file changes on main: registers the workflow and seeds
  # the dashboard snapshot. push runs are forced to dry-run (no Slack alert).
  push:
    branches: [main]
    paths: [".github/workflows/forecast.yml"]

permissions:
  contents: read

concurrency:
  group: liquidity-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Persist the alert-state DB across runs so the state-change-only send rule
      # works (runners are ephemeral). Best-effort: a cache miss at worst causes a
      # single duplicate alert. A fresh cache is saved each run via the unique key.
      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: data
          key: forecaster-db-${{ github.run_id }}
          restore-keys: forecaster-db-

      - name: Run forecaster
        env:
          FOLIO_API_KEY: ${{ secrets.FOLIO_API_KEY }}
          FOLIO_API_BASE_URL: ${{ secrets.FOLIO_API_BASE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ vars.ALERT_EMAIL_TO }}
          FORECAST_FLOOR: ${{ vars.FORECAST_FLOOR }}
          FORECAST_HORIZON_DAYS: ${{ vars.FORECAST_HORIZON_DAYS }}
          FORECAST_BASELINE: ${{ vars.FORECAST_BASELINE }}
          FOLIO_OPERATIONAL_ACCOUNT: ${{ vars.FOLIO_OPERATIONAL_ACCOUNT }}
          EXPECTED_INFLOWS_FILE: ${{ vars.EXPECTED_INFLOWS_FILE }}
          FX_RATES: ${{ vars.FX_RATES }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: ${{ inputs.dry_run }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -z "$FOLIO_API_KEY" ]; then
            echo "FOLIO_API_KEY is not configured — skipping. Set repo secrets to enable (docs/SECRETS.md)."
            exit 0
          fi
          # Refresh cached daily balances (incremental) so the run-rate baseline has data.
          python -m liquidity_forecaster sync-history || echo "sync-history failed; continuing without fresh baseline data"
          # push events (workflow-file changes) seed the snapshot without sending an alert.
          MODE="$DRY_RUN"
          if [ "$EVENT_NAME" = "push" ]; then MODE="true"; fi
          if [ "$MODE" = "true" ]; then
            python -m liquidity_forecaster run --dry-run
          else
            python -m liquidity_forecaster run
          fi
