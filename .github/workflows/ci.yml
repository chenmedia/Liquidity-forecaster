name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests api

      - name: Format check (ruff)
        run: ruff format --check src tests api

      - name: Type check (mypy)
        run: mypy src

      - name: Tests (pytest)
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint (next)
        run: npx next lint

      - name: Unit tests (vitest)
        run: npx vitest run

