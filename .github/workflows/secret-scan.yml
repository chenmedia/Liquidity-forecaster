name: Secret scan

# CI backstop for secret scanning. Local pre-commit hooks can be bypassed
# (e.g. `git commit --no-verify`); this runs on the server and cannot be.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan the whole git history, not just the tip

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version

      - name: Scan repository and history
        run: |
          ./gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1
