# Pre-commit hooks for Liquidity Forecaster.
# Install once:  pip install pre-commit && pre-commit install
# Then gitleaks runs automatically on every `git commit`, blocking secrets
# before they enter history. See docs/SECRETS.md.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets (gitleaks)
        # Uses .gitleaks.toml in the repo root automatically.
